name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Pages configuration
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(curl -L -sS --connect-timeout 5 --max-time 15 -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [ "$status" = "404" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitHub Pages is not enabled for this repository. Enable Pages in Settings and select GitHub Actions as the source to deploy this site."
          else
            echo "::error::Failed to query GitHub Pages configuration (HTTP $status)."
            exit 1
          fi

      - name: Setup Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4
